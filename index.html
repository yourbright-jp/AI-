/* ═══ TTS ═══ */
function tts(text){
  return new Promise(res=>{
    if(!("speechSynthesis" in window)){res();return}
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang="ja-JP";u.rate=0.88;u.pitch=0.95;
    const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("ja"));
    if(v)u.voice=v;u.onend=res;u.onerror=res;window.speechSynthesis.speak(u);
  });
}

/* ═══ STT Hook ═══ */
const SRC=window.SpeechRecognition||window.webkitSpeechRecognition||null;
function useSTT(){
  const ref=useRef(null),cbRef=useRef(null),[on,setOn]=useState(false),[ok]=useState(!!SRC);
  const start=useCallback(cb=>{
    if(!SRC||ref.current)return;cbRef.current=cb;
    try{
      const r=new SRC();r.lang="ja-JP";r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
      let acc="";
      r.onstart=()=>setOn(true);
      r.onresult=e=>{
        let f=acc,im="";
        for(let i=e.resultIndex;i<e.results.length;i++){
          const t=e.results[i][0].transcript;
          if(e.results[i].isFinal){f+=t;acc=f}else im+=t;
        }
        cbRef.current?.(f+im);
      };
      r.onerror=e=>{if(e.error==="not-allowed"||e.error==="service-not-allowed"){setOn(false);ref.current=null}};
      r.onend=()=>{if(ref.current){try{r.start()}catch{setOn(false);ref.current=null}}else setOn(false)};
      r.start();ref.current=r;
    }catch{setOn(false)}
  },[]);
  const stop=useCallback(()=>{const r=ref.current;ref.current=null;if(r)try{r.stop()}catch{};setOn(false)},[]);
  return{start,stop,on,ok};
}

/* ═══ Recorder Hook ═══ */
function useRec(){
  const mr=useRef(null),ch=useRef([]),[on,setOn]=useState(false),[blob,setBlob]=useState(null),[url,setUrl]=useState(null);
  const go=useCallback(async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      const m=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/mp4"});
      ch.current=[];
      m.ondataavailable=e=>{if(e.data.size>0)ch.current.push(e.data)};
      m.onstop=()=>{const b=new Blob(ch.current,{type:m.mimeType});setBlob(b);setUrl(URL.createObjectURL(b));s.getTracks().forEach(t=>t.stop())};
      m.start(1000);mr.current=m;setOn(true);
    }catch(e){console.error("Mic denied:",e)}
  },[]);
  const end=useCallback(()=>{if(mr.current&&mr.current.state!=="inactive")mr.current.stop();mr.current=null;setOn(false)},[]);
  const reset=useCallback(()=>{if(url)URL.revokeObjectURL(url);setBlob(null);setUrl(null);ch.current=[]},[url]);
  return{go,end,reset,on,blob,url};
}

          </div>}
        </div>

        {/* 応募職種 */}
        <div style={{...cd,marginBottom:24,animation:"fadeUp .6s .2s both"}}>
          <label style={lb}>応募職種</label>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {POS.map(p=>{const s=pos===p.id;return<button key={p.id} onClick={()=>setPos(p.id)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:12,border:`1px solid ${s?C.ac+"55":C.bd}`,background:s?C.ad:"transparent",color:s?C.tx:C.tm,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:500,textAlign:"left"}}><span style={{fontSize:22,width:32,textAlign:"center"}}>{p.icon}</span><span>{p.label}</span></button>})}
          </div>
        </div>

        <button onClick={begin} disabled={!pos||!nm.trim()||cvLoading} style={{...pbtn(pos&&nm.trim()&&!cvLoading),animation:"fadeUp .6s .3s both"}}>🎙️ 面接を開始する（録音開始）</button>
        {cvLoading&&<p style={{textAlign:"center",color:C.am,fontSize:12,marginTop:8}}>⏳ 履歴書分析中です。少々お待ちください...</p>}
        {!stt.ok&&<p style={{textAlign:"center",color:C.am,fontSize:12,marginTop:12}}>⚠ 音声認識非対応。テキスト入力で回答できます。</p>}
        <p style={{textAlign:"center",color:C.td,fontSize:11,marginTop:10,lineHeight:1.5}}>※ マイクのアクセス許可が必要です。「許可」を押してください。<br/>※ 面接全体が録音されます。</p>
        <div style={{textAlign:"center",marginTop:16}}><button onClick={()=>{localStorage.removeItem(API_KEY_STORE);setKey("");setPh("apikey")}} style={{background:"none",border:"none",color:C.td,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>APIキーを変更</button></div>
      </div>
    </div>
  );

  /* ═══ INTERVIEW SCREEN ═══ */
  if(ph==="interview"){
    const totalQ=fullQs.filter(q=>!(q.cond==="prayer"&&skipP)).length;
    const answeredCount=ans.length;
    const prog=(answeredCount/totalQ)*100;
    const curQ=fullQs[qi];
    return(
      <div style={sh}>{bg}
        <div style={{position:"relative",zIndex:1,maxWidth:620,margin:"0 auto",padding:"32px 24px"}}>
          {rec.on&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:C.rd,animation:"recBlink 1s infinite"}}/><span style={{fontSize:12,color:C.rd,fontWeight:600}}>録音中</span>
          </div>}
          <div style={{marginBottom:24}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:12,color:C.td}}>質問 {answeredCount+1}/{totalQ}</span>
              <div style={{display:"flex",gap:6}}>
                {curQ?.cvGen&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:"rgba(45,212,191,.1)",color:C.tl,fontWeight:600}}>📄 CV</span>}
                <span style={{fontSize:11,padding:"3px 10px",borderRadius:16,background:C.ad,color:C.ac,fontWeight:600}}>{curQ?.t}</span>
              </div>
            </div>
            <div style={{height:2,background:"rgba(255,255,255,.04)",borderRadius:1}}><div style={{height:"100%",width:`${Math.min(prog,100)}%`,borderRadius:1,background:`linear-gradient(90deg,${C.ac},${C.tl})`,transition:"width .5s"}}/></div>
          </div>

          <div style={{...cd,textAlign:"center",marginBottom:18,animation:"fadeUp .4s"}}>
            <div style={{marginBottom:18}}><Orb on={spk}/></div>
            <p style={{fontSize:17,lineHeight:1.85,color:"rgba(255,255,255,.88)",margin:"0 0 14px"}}>{curQ?.q}</p>
            {!spk&&<button onClick={()=>spkQ(qi)} style={{padding:"6px 14px",borderRadius:8,background:C.ad,border:`1px solid ${C.ac}30`,color:C.ac,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>🔊 もう一度再生</button>}
          </div>

          <div style={cd}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{...lb,margin:0}}>回答</span>
              {stt.on&&<span style={{fontSize:12,color:C.rd,fontWeight:500,animation:"fadeUp .3s"}}>● 音声認識中…</span>}
            </div>
            {stt.ok&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,marginBottom:14}}>
              <Mic on={stt.on} click={togMic} dis={spk} rec={rec.on}/>
              <span style={{fontSize:11,color:C.td}}>{stt.on?"話してください…もう一度タップで停止":"タップして音声入力"}</span>
            </div>}
            <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder={stt.ok?"🎤 マイクで話す、またはここに入力…":"回答を入力…"} rows={4} style={{...ip,resize:"vertical",fontSize:14,lineHeight:1.75}} onFocus={fo} onBlur={bl}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
              <span style={{fontSize:11,color:C.td}}>{draft.length}文字</span>
              <button onClick={submit} disabled={!draft.trim()} style={{padding:"10px 22px",borderRadius:10,border:"none",background:draft.trim()?`linear-gradient(135deg,${C.ac},#1e50a0)`:"rgba(255,255,255,.04)",color:draft.trim()?"#fff":"rgba(255,255,255,.2)",fontSize:14,fontWeight:600,cursor:draft.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}>{qi<fullQs.length-1?"次の質問 →":"面接を終了 ✓"}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ═══ EVALUATING SCREEN ═══ */
  if(ph==="evaluating")return(
    <div style={{...sh,display:"flex",alignItems:"center",justifyContent:"center"}}>{bg}
      <div style={{textAlign:"center",zIndex:1,animation:"fadeUp .5s"}}>
        <div style={{width:90,height:90,borderRadius:"50%",margin:"0 auto 24px",background:`conic-gradient(${C.ac},${C.tl},${C.ac})`,animation:"spin 1.6s linear infinite",padding:3}}>
          <div style={{width:"100%",height:"100%",borderRadius:"50%",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>📝</div>
        </div>
        <h2 style={{fontSize:18,fontWeight:600,margin:"0 0 6px"}}>AIが評価中…</h2>
        <p style={{color:C.td,fontSize:13}}>{hasR?"履歴書読み取り＆回答分析中":"回答と日本語を分析中"}</p>
      </div>
    </div>
  );

  /* ═══ RESULT SCREEN ═══ */
  if(ph==="result"&&ev){
    const r=ev.recommendation,rc=r==="合格"?C.gn:r==="保留"?C.am:C.rd,corr=ev.grammar_corrections||[];
    return(
      <div style={sh}>{bg}
        <div style={{position:"relative",zIndex:1,maxWidth:640,margin:"0 auto",padding:"36px 24px 60px"}}>
          <div style={{textAlign:"center",marginBottom:28,animation:"fadeUp .5s"}}><h1 style={{fontSize:21,fontWeight:600,margin:"0 0 4px"}}>面接評価レポート / Interview Report</h1><p style={{color:C.td,fontSize:13}}>{nm} — {POS.find(p=>p.id===pos)?.label}</p></div>

          {/* 判定 */}
          <div style={{...cd,textAlign:"center",marginBottom:14,borderColor:rc+"20",animation:"fadeUp .5s .1s both"}}>
            <div style={{display:"inline-block",padding:"6px 24px",borderRadius:20,background:rc+"18",border:`1px solid ${rc}44`,color:rc,fontSize:17,fontWeight:700}}>判定：{r}</div>
            <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:14}}>
              <div><div style={{fontSize:11,color:C.td,marginBottom:2}}>総合</div><div style={{fontSize:22,fontWeight:700}}>{ev.overall}/5</div></div>
              <div><div style={{fontSize:11,color:C.td,marginBottom:2}}>日本語</div><div style={{fontSize:22,fontWeight:700,color:C.ac}}>{ev.japanese_level}</div></div>
            </div>
          </div>

          {/* 評価項目 */}
          <div style={{...cd,marginBottom:14,animation:"fadeUp .5s .2s both"}}>
            <h3 style={{...lb,margin:"0 0 14px"}}>評価項目</h3>
            {crit.map(c=><div key={c.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:13,color:C.tm}}>{c.i} {c.l}</span><SB s={ev.scores[c.k]||3}/></div>)}
          </div>

          {/* 総合コメント - Bilingual */}
          <div style={{...cd,marginBottom:14,animation:"fadeUp .5s .25s both"}}>
            <h3 style={{...lb,margin:"0 0 10px"}}>総合コメント</h3>
            <p style={{fontSize:14,lineHeight:1.8,color:C.tm,margin:"0 0 12px"}}>{ev.summary}</p>
            {ev.summary_lang&&<div style={{padding:"12px 14px",borderRadius:10,background:"rgba(45,212,191,.06)",border:`1px solid ${C.tl}22`}}>
              <div style={{fontSize:11,color:C.tl,fontWeight:600,marginBottom:6}}>{langObj.flag} {langObj.label}</div>
              <p style={{fontSize:14,lineHeight:1.8,color:C.tm,margin:0}}>{ev.summary_lang}</p>
            </div>}
          </div>

          {/* 履歴書照合 - Bilingual */}
          {ev.resume_analysis&&<div style={{...cd,marginBottom:14,borderColor:C.tl+"18",animation:"fadeUp .5s .28s both"}}>
            <h3 style={{fontSize:11,color:C.tl,margin:"0 0 10px",fontWeight:600,letterSpacing:2}}>📄 履歴書照合</h3>
            <p style={{fontSize:14,lineHeight:1.8,color:C.tm,margin:"0 0 10px"}}>{ev.resume_analysis}</p>
            {ev.resume_analysis_lang&&<div style={{padding:"12px 14px",borderRadius:10,background:"rgba(45,212,191,.04)",border:`1px solid ${C.tl}15`}}>
              <div style={{fontSize:11,color:C.tl,fontWeight:600,marginBottom:6}}>{langObj.flag} {langObj.label}</div>
              <p style={{fontSize:14,lineHeight:1.8,color:C.tm,margin:0}}>{ev.resume_analysis_lang}</p>
            </div>}
          </div>}

          {/* 強み・改善点 - Bilingual */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14,animation:"fadeUp .5s .3s both"}}>
            <div style={{...cd,padding:18,borderColor:C.gn+"15"}}>
              <h3 style={{fontSize:11,color:C.gn,margin:"0 0 10px",fontWeight:600}}>💪 強み</h3>
              {(ev.strengths||[]).map((s,i)=><p key={i} style={{fontSize:13,lineHeight:1.6,color:C.tm,margin:"0 0 4px"}}>· {s}</p>)}
              {ev.strengths_lang&&ev.strengths_lang.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.gn}15`}}>
                <div style={{fontSize:10,color:C.gn,marginBottom:4}}>{langObj.flag}</div>
                {ev.strengths_lang.map((s,i)=><p key={i} style={{fontSize:12,lineHeight:1.6,color:C.td,margin:"0 0 4px"}}>· {s}</p>)}
              </div>}
            </div>
            <div style={{...cd,padding:18,borderColor:C.am+"15"}}>
              <h3 style={{fontSize:11,color:C.am,margin:"0 0 10px",fontWeight:600}}>📝 改善点</h3>
              {(ev.improvements||[]).map((s,i)=><p key={i} style={{fontSize:13,lineHeight:1.6,color:C.tm,margin:"0 0 4px"}}>· {s}</p>)}
              {ev.improvements_lang&&ev.improvements_lang.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.am}15`}}>
                <div style={{fontSize:10,color:C.am,marginBottom:4}}>{langObj.flag}</div>
                {ev.improvements_lang.map((s,i)=><p key={i} style={{fontSize:12,lineHeight:1.6,color:C.td,margin:"0 0 4px"}}>· {s}</p>)}
              </div>}
            </div>
          </div>

          {/* ═══ 解説セクション（候補者向け・Bilingual） ═══ */}
          {corr.length>0&&<div style={{...cd,marginBottom:14,borderColor:C.tl+"25",background:"rgba(45,212,191,.03)",animation:"fadeUp .5s .35s both"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.tl},#1a7a70)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📖</div>
              <div>
                <h3 style={{fontSize:15,fontWeight:600,margin:0,color:C.tl}}>解説 / Explanation</h3>
                <p style={{fontSize:11,color:C.td,margin:0}}>日本語の文法修正と解説 ({langObj.label})</p>
              </div>
            </div>
            {corr.map((c,i)=><div key={i} style={{padding:"16px 14px",borderRadius:12,marginBottom:12,background:"rgba(255,255,255,.02)",border:`1px solid ${C.bd}`}}>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:C.td,marginBottom:6,fontWeight:600}}>#{i+1}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:13,padding:"3px 10px",borderRadius:8,background:"rgba(248,113,113,.12)",color:C.rd,textDecoration:"line-through"}}>{c.original}</span>
                  <span style={{color:C.td,fontSize:14}}>→</span>
                  <span style={{fontSize:13,padding:"3px 10px",borderRadius:8,background:"rgba(52,211,153,.12)",color:C.gn,fontWeight:500}}>{c.corrected}</span>
                </div>
              </div>
              {/* 日本語解説 */}
              <div style={{padding:"10px 12px",borderRadius:8,background:"rgba(61,139,253,.04)",border:`1px solid ${C.ac}15`,marginBottom:8}}>
                <div style={{fontSize:10,color:C.ac,fontWeight:600,marginBottom:4}}>🇯🇵 日本語</div>
                <p style={{fontSize:13,color:C.tm,margin:0,lineHeight:1.7}}>{c.explanation_ja||c.explanation_vi||""}</p>
              </div>
              {/* 候補者言語解説 */}
              <div style={{padding:"10px 12px",borderRadius:8,background:"rgba(45,212,191,.04)",border:`1px solid ${C.tl}15`}}>
                <div style={{fontSize:10,color:C.tl,fontWeight:600,marginBottom:4}}>{langObj.flag} {langObj.label}</div>
                <p style={{fontSize:13,color:C.tm,margin:0,lineHeight:1.7}}>{c.explanation_lang||c.explanation_vi||""}</p>
              </div>
            </div>)}
          </div>}

          {/* 録音 */}
          {rec.url&&<div style={{...cd,marginBottom:14,animation:"fadeUp .5s .4s both"}}><h3 style={{fontSize:11,color:C.ac,margin:"0 0 12px",fontWeight:600,letterSpacing:2}}>🎧 面接録音</h3><audio controls src={rec.url}/></div>}

          {/* 送信セクション */}
          <div style={{...cd,marginBottom:14,animation:"fadeUp .5s .45s both"}}>
            <h3 style={{fontSize:11,color:C.ac,margin:"0 0 12px",fontWeight:600,letterSpacing:2}}>📧 結果を送信・ダウンロード</h3>
            {compEmail.trim()?<p style={{fontSize:12,color:C.td,marginBottom:6}}>送信先: <strong style={{color:C.ac}}>{compEmail}</strong></p>
            :<p style={{fontSize:12,color:C.am,marginBottom:6}}>⚠ 送信先メールが未設定のため、ダウンロードのみ行います。</p>}
            <p style={{fontSize:12,color:C.td,marginBottom:12,lineHeight:1.6}}>{compEmail.trim()?"評価レポートと録音ファイルをメールで直接送信します。":"レポート(.txt)と録音ファイルをダウンロードします。"}</p>
            <button onClick={send} disabled={sendSt==="sending"} style={{
              width:"100%",padding:14,borderRadius:12,border:"none",
              background:sendSt==="done"?"rgba(52,211,153,.15)":sendSt==="sending"?"rgba(255,255,255,.04)":`linear-gradient(135deg,${C.ac},#1e50a0)`,
              color:sendSt==="done"?C.gn:sendSt==="sending"?C.td:"#fff",
              fontSize:14,fontWeight:600,cursor:sendSt==="sending"?"wait":"pointer",fontFamily:"inherit",
            }}>{sendSt===""?(compEmail.trim()?"📧 メールで送信（録音付き）":"📥 ダウンロード"):sendSt==="sending"?(compEmail.trim()?"📧 録音ファイルを送信中…":"処理中…"):sendSt==="done"?(compEmail.trim()?"✅ メール送信完了！録音付き":"✅ ダウンロード済み"):"⚠ エラー — もう一度お試しください"}</button>
            {sendSt==="error"&&<button onClick={()=>setSendSt("")} style={{width:"100%",marginTop:8,padding:10,borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",color:C.tm,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>再試行</button>}
          </div>

          {/* 全回答記録 */}
          <details style={{marginBottom:14,animation:"fadeUp .5s .48s both"}}>
            <summary style={{...cd,cursor:"pointer",fontSize:13,color:C.tm,fontWeight:500,listStyle:"none"}}>
              📋 全回答記録を表示 ({ans.length}問)
            </summary>
            <div style={{...cd,marginTop:2,borderTop:"none",borderTopLeftRadius:0,borderTopRightRadius:0}}>
              {ans.map((a,i)=><div key={i} style={{marginBottom:14,paddingBottom:14,borderBottom:i<ans.length-1?`1px solid ${C.bd}`:"none"}}>
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <span style={{fontSize:11,color:C.ac,fontWeight:600}}>Q{i+1}</span>
                  <span style={{fontSize:11,padding:"1px 6px",borderRadius:8,background:C.ad,color:C.ac}}>{a.tag}</span>
                  {a.cvGen&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:"rgba(45,212,191,.1)",color:C.tl}}>CV</span>}
                </div>
                <p style={{fontSize:13,color:C.td,margin:"0 0 4px"}}>{a.question}</p>
                <p style={{fontSize:13,color:C.tm,margin:0}}>{a.answer}</p>
              </div>)}
            </div>
          </details>

          <button onClick={restart} style={{width:"100%",padding:13,borderRadius:12,border:`1px solid ${C.bd}`,background:"transparent",color:C.tm,fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:500,animation:"fadeUp .5s .5s both"}}>↻ 新しい面接</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
